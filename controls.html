<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trading Controls - Aster Pilot</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'IBM Plex Mono', monospace;
      background: #080a0c;
      color: #e0e0e0;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #c9a55a; margin-bottom: 30px; font-size: 24px; }
    h2 { color: #c9a55a; margin: 30px 0 15px; font-size: 18px; }
    
    .mode-switcher {
      background: #0f1419;
      border: 1px solid #1e2329;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .mode-buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    .mode-btn {
      flex: 1;
      padding: 15px;
      border: 2px solid #1e2329;
      background: #0f1419;
      color: #e0e0e0;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'IBM Plex Mono';
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .mode-btn:hover { border-color: #c9a55a; }
    .mode-btn.active { border-color: #c9a55a; background: #c9a55a20; color: #c9a55a; }
    .mode-btn.live { border-color: #f0465a; }
    .mode-btn.live.active { border-color: #f0465a; background: #f0465a20; color: #f0465a; }
    
    .kill-switch {
      background: #0f1419;
      border: 2px solid #f0465a;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      text-align: center;
    }
    .kill-btn {
      width: 100%;
      padding: 20px;
      background: #f0465a;
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'IBM Plex Mono';
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
    }
    .kill-btn:hover { background: #d93d4e; }
    .kill-btn.active { background: #2dd4a0; }
    
    .checklist {
      background: #0f1419;
      border: 1px solid #1e2329;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .check-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #1e2329;
    }
    .check-item:last-child { border-bottom: none; }
    .check-label { font-size: 14px; }
    .check-status {
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }
    .check-status.green { background: #2dd4a020; color: #2dd4a0; }
    .check-status.red { background: #f0465a20; color: #f0465a; }
    
    .status-panel {
      background: #0f1419;
      border: 1px solid #1e2329;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }
    .status-item {
      background: #080a0c;
      padding: 12px;
      border-radius: 6px;
    }
    .status-label { font-size: 11px; color: #888; margin-bottom: 5px; }
    .status-value { font-size: 14px; font-weight: 600; color: #e0e0e0; }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }
    .stat-card {
      background: #0f1419;
      border: 1px solid #1e2329;
      border-radius: 8px;
      padding: 15px;
      text-align: center;
    }
    .stat-label { font-size: 11px; color: #888; margin-bottom: 5px; }
    .stat-value { font-size: 20px; font-weight: 700; }
    .stat-value.green { color: #2dd4a0; }
    .stat-value.red { color: #f0465a; }
    
    .trades-table {
      background: #0f1419;
      border: 1px solid #1e2329;
      border-radius: 8px;
      padding: 20px;
      margin-top: 20px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th {
      text-align: left;
      padding: 10px;
      border-bottom: 1px solid #1e2329;
      color: #888;
      font-weight: 600;
    }
    td {
      padding: 10px;
      border-bottom: 1px solid #0f1419;
    }
    tr:hover { background: #080a0c; }
    
    .halted-banner {
      background: #f0465a;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: 700;
      font-size: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }
    .halted-banner.active { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛡️ Trading Controls & Safeguards</h1>
    
    <div class="halted-banner" id="haltedBanner">
      🚨 TRADING HALTED - Kill switch or circuit breaker active
    </div>
    
    <div class="mode-switcher">
      <div style="font-size: 12px; color: #888; margin-bottom: 10px;">TRADING MODE</div>
      <div class="mode-buttons">
        <button class="mode-btn active" onclick="setMode('paper')">📝 Paper</button>
        <button class="mode-btn" onclick="setMode('live_armed')">⚠️ Live Armed</button>
        <button class="mode-btn live" onclick="setMode('live')">🔴 Live Trading</button>
      </div>
    </div>
    
    <div class="kill-switch">
      <div style="font-size: 12px; color: #888; margin-bottom: 5px;">EMERGENCY STOP</div>
      <button class="kill-btn" id="killBtn" onclick="toggleKillSwitch()">
        🛑 ACTIVATE KILL SWITCH
      </button>
    </div>
    
    <div class="checklist">
      <h2>Pre-Live Checklist</h2>
      <div id="checklist"></div>
    </div>
    
    <div class="status-panel">
      <h2>System Status</h2>
      <div class="status-grid" id="systemStatus"></div>
    </div>
    
    <h2>Trading Statistics</h2>
    <div class="stats-grid" id="statsGrid"></div>
    
    <div class="trades-table">
      <h2>Last 20 Trades</h2>
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Symbol</th>
            <th>Side</th>
            <th>Entry</th>
            <th>Exit</th>
            <th>P&L</th>
            <th>Reason</th>
          </tr>
        </thead>
        <tbody id="tradesTable"></tbody>
      </table>
    </div>
  </div>
  
  <script>
    let data = {};
    let strategy = {};
    
    async function fetchData() {
      try {
        const response = await fetch('https://raw.githubusercontent.com/zjchen1991/ztrading-data/main/data.json?t=' + Date.now());
        data = await response.json();
        
        const stratResponse = await fetch('/strategy.json');
        strategy = await stratResponse.json();
        
        render();
      } catch (e) {
        console.error('Failed to fetch data:', e);
      }
    }
    
    function render() {
      // Update mode buttons
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      const currentMode = data.mode || 'paper';
      document.querySelector(`.mode-btn[onclick*="${currentMode}"]`)?.classList.add('active');
      
      // Update kill switch
      const killBtn = document.getElementById('killBtn');
      if (data.kill_switch) {
        killBtn.textContent = '✅ KILL SWITCH ACTIVE';
        killBtn.classList.add('active');
      } else {
        killBtn.textContent = '🛑 ACTIVATE KILL SWITCH';
        killBtn.classList.remove('active');
      }
      
      // Update halted banner
      if (data.kill_switch || data.circuit_breaker_active) {
        document.getElementById('haltedBanner').classList.add('active');
      } else {
        document.getElementById('haltedBanner').classList.remove('active');
      }
      
      // Render checklist
      const checks = strategy.pre_live_checks || {};
      let checklistHTML = '';
      for (const [key, value] of Object.entries(checks)) {
        const label = key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        const status = value ? 'green' : 'red';
        const text = value ? '✓ OK' : '✗ FAIL';
        checklistHTML += `
          <div class="check-item">
            <div class="check-label">${label}</div>
            <div class="check-status ${status}">${text}</div>
          </div>
        `;
      }
      document.getElementById('checklist').innerHTML = checklistHTML;
      
      // Render system status
      let statusHTML = '';
      const statuses = [
        { label: 'Exchange Status', value: data.last_price_update ? '🟢 Connected' : '🔴 Disconnected' },
        { label: 'Last Price Update', value: data.last_price_update ? new Date(data.last_price_update).toLocaleTimeString() : 'N/A' },
        { label: 'Open Positions', value: data.open_positions || 0 },
        { label: 'Daily Trades', value: data.daily_trades || 0 },
        { label: 'Consecutive Losses', value: data.consecutive_losses || 0 },
        { label: 'Circuit Breaker', value: data.circuit_breaker_active ? '🔴 ACTIVE' : '🟢 OK' }
      ];
      
      statuses.forEach(s => {
        statusHTML += `
          <div class="status-item">
            <div class="status-label">${s.label}</div>
            <div class="status-value">${s.value}</div>
          </div>
        `;
      });
      document.getElementById('systemStatus').innerHTML = statusHTML;
      
      // Render stats
      let statsHTML = '';
      const stats = [
        { label: 'Equity', value: '$' + (data.equity || 10000).toFixed(0), color: data.total_pnl >= 0 ? 'green' : 'red' },
        { label: 'Total P&L', value: '$' + (data.total_pnl || 0).toFixed(2), color: data.total_pnl >= 0 ? 'green' : 'red' },
        { label: 'Daily P&L', value: '$' + (data.daily_pnl || 0).toFixed(2), color: data.daily_pnl >= 0 ? 'green' : 'red' },
        { label: 'Win Rate', value: (data.win_rate || 0).toFixed(1) + '%', color: '' },
        { label: 'Max DD', value: (data.max_drawdown || 0).toFixed(1) + '%', color: '' },
        { label: 'Avg Win', value: '$' + (data.avg_win || 0).toFixed(2), color: 'green' },
        { label: 'Avg Loss', value: '$' + (data.avg_loss || 0).toFixed(2), color: 'red' },
        { label: 'Profit Factor', value: (data.profit_factor || 0).toFixed(2), color: '' },
        { label: 'Open Risk', value: '$' + (data.open_risk || 0).toFixed(2), color: '' }
      ];
      
      stats.forEach(s => {
        statsHTML += `
          <div class="stat-card">
            <div class="stat-label">${s.label}</div>
            <div class="stat-value ${s.color}">${s.value}</div>
          </div>
        `;
      });
      document.getElementById('statsGrid').innerHTML = statsHTML;
      
      // Render trades table
      let tradesHTML = '';
      const trades = data.last_20_trades || [];
      trades.slice().reverse().forEach(t => {
        const time = new Date(t.closed_at || t.opened_at).toLocaleTimeString();
        const color = t.pnl >= 0 ? 'color: #2dd4a0' : 'color: #f0465a';
        tradesHTML += `
          <tr>
            <td>${time}</td>
            <td>${t.symbol}</td>
            <td style="color: ${t.side === 'LONG' ? '#2dd4a0' : '#f0465a'}">${t.side}</td>
            <td>$${t.entry_price?.toFixed(2)}</td>
            <td>$${t.exit_price?.toFixed(2)}</td>
            <td style="${color}; font-weight: 700">${t.pnl >= 0 ? '+' : ''}$${t.pnl?.toFixed(2)}</td>
            <td style="font-size: 11px">${t.exit_reason || 'open'}</td>
          </tr>
        `;
      });
      document.getElementById('tradesTable').innerHTML = tradesHTML || '<tr><td colspan="7" style="text-align: center; color: #888">No trades yet</td></tr>';
    }
    
    function setMode(mode) {
      // TODO: Implement mode change via API
      alert(`Mode change to ${mode} - Implement API endpoint`);
    }
    
    function toggleKillSwitch() {
      // TODO: Implement kill switch via API
      alert('Kill switch toggle - Implement API endpoint');
    }
    
    // Fetch data every 5 seconds
    fetchData();
    setInterval(fetchData, 5000);
  </script>
</body>
</html>
